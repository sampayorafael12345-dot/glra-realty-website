<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLRA Realty - Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --orange: #f97316;
  --orange-dark: #ea580c;
  --orange-light: #ffedd5;
  --dark: #111827;
  --dark-gray: #1f2937;
  --gray: #6b7280;
  --gray-light: #f3f4f6;
  --white: #ffffff;
  --success: #10b981;
  --danger: #ef4444;
  --info: #3b82f6;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
  --shadow-md: 0 8px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
}

body.dark-mode {
  --dark: #e0e0e0;
  --dark-gray: #c0c0c0;
  --gray: #a0a0a0;
  --gray-light: #1a1a2a;
  --white: #0f0f1a;
  --border-color: #2a2a3a;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--gray-light);
  color: var(--dark);
  transition: background 0.3s ease, color 0.3s ease;
}

.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, var(--dark) 0%, var(--orange) 100%);
}

.login-box {
  background: var(--white);
  padding: 45px 40px;
  border-radius: 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}

.login-box h1 { margin-bottom: 30px; color: var(--orange); font-size: 32px; }
.login-box input {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 20px;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  font-size: 14px;
}
.login-box button {
  width: 100%;
  padding: 14px;
  background: var(--orange);
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
}

.dashboard { display: none; background: var(--gray-light); min-height: 100vh; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

.header {
  background: var(--white);
  padding: 20px 28px;
  border-radius: 20px;
  margin-bottom: 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
  box-shadow: var(--shadow-sm);
}

.header h1 { color: var(--orange); font-size: 24px; display: flex; align-items: center; gap: 10px; }
.header-right { display: flex; gap: 12px; align-items: center; }

.darkmode-btn-header {
  background: #1e1e2e;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.logout-btn {
  background: var(--danger);
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--white);
  padding: 24px;
  border-radius: 20px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  border-bottom: 4px solid var(--orange);
}

.stat-card .number { font-size: 42px; font-weight: 800; color: var(--orange); }
.stat-card h3 { color: var(--gray); font-size: 13px; margin-bottom: 12px; }

.status-summary {
  background: var(--white);
  padding: 16px 24px;
  border-radius: 16px;
  margin-bottom: 28px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.status-badge { padding: 6px 14px; border-radius: 40px; font-size: 12px; font-weight: 600; }
.status-available { background: var(--success); color: white; }
.status-leased { background: #f59e0b; color: white; }
.status-reserved { background: var(--info); color: white; }
.status-sold { background: var(--danger); color: white; }
.status-dnp { background: var(--gray); color: white; }

.tabs {
  display: flex;
  gap: 12px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.tab {
  padding: 12px 28px;
  background: var(--white);
  border: none;
  cursor: pointer;
  border-radius: 40px;
  font-weight: 600;
  transition: all 0.3s ease;
  color: var(--gray);
  box-shadow: var(--shadow-sm);
}

.tab.active { background: var(--orange); color: white; }
.tab:hover { background: var(--orange); color: white; }

.tab-content { display: none; background: var(--white); padding: 32px; border-radius: 24px; }
.tab-content.active { display: block; }

.search-bar-admin {
  background: var(--gray-light);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 24px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.search-bar-admin input, .search-bar-admin select {
  padding: 12px 16px;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  background: var(--white);
}

.search-bar-admin button {
  background: var(--orange);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 40px;
  cursor: pointer;
}

.property-list { display: flex; flex-direction: column; gap: 16px; }

.property-item {
  background: var(--white);
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.property-info { flex: 1; }
.property-title { font-size: 18px; font-weight: 700; color: var(--orange); margin-bottom: 8px; }
.property-details { display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px; color: var(--gray); }

.property-actions button {
  padding: 8px 18px;
  border-radius: 40px;
  margin-left: 8px;
}

.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  background: var(--white);
}

.image-upload-btn {
  background: var(--orange);
  color: white;
  padding: 12px 24px;
  border-radius: 40px;
  cursor: pointer;
  border: none;
}

.gallery-preview { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
.gallery-preview-item { position: relative; }
.gallery-preview-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; }
.remove-img {
  position: absolute;
  top: -8px;
  right: -8px;
  background: var(--danger);
  color: white;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--dark);
  color: white;
  padding: 12px 20px;
  border-radius: 12px;
  z-index: 1200;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { transform: translateX(400px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.empty-state { text-align: center; padding: 60px; color: var(--gray); }
.empty-state i { font-size: 56px; margin-bottom: 16px; color: var(--orange); }

@media (max-width: 768px) {
  .property-item { flex-direction: column; align-items: flex-start; }
  .property-actions { width: 100%; justify-content: flex-end; }
}
</style>
</head>
<body>

<div class="login-container" id="loginContainer">
  <div class="login-box">
    <h1><i class="fas fa-key"></i> GLRA Admin</h1>
    <input type="email" id="adminEmail" placeholder="Email" value="admin@glrarealty.com">
    <input type="password" id="adminPassword" placeholder="Password" value="admin123">
    <button onclick="login()">Login to Dashboard</button>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-building"></i> GLRA Realty Admin</h1>
      <div class="header-right">
        <button class="darkmode-btn-header" id="headerDarkModeToggle" onclick="toggleDarkMode()">
          <i class="fas fa-moon"></i> Dark Mode
        </button>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
    
    <div class="stats" id="stats"></div>
    <div class="status-summary" id="statusSummary"></div>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTab('properties')">Properties</button>
      <button class="tab" onclick="switchTab('add')">Add Property</button>
      <button class="tab" onclick="switchTab('inquiries')">Inquiries</button>
      <button class="tab" onclick="switchTab('subscribers')">Subscribers</button>
      <button class="tab" onclick="switchTab('alerts')">Alerts</button>
      <button class="tab" onclick="switchTab('images')">Hero Images</button>
    </div>
    
    <div id="propertiesTab" class="tab-content active">
      <div class="search-bar-admin">
        <input type="text" id="searchInput" placeholder="Search by title or location...">
        <select id="searchStatus"><option value="">All Status</option><option value="available">Available</option><option value="leased">Leased</option><option value="sold">Sold</option></select>
        <button onclick="searchProperties()">Search</button>
        <button class="clear-btn" onclick="clearSearch()">Clear</button>
      </div>
      <div class="property-list" id="propertyList"></div>
    </div>
    
    <div id="addTab" class="tab-content">
      <form id="propertyForm">
        <div class="form-row">
          <div class="form-group"><label>Title *</label><input type="text" name="title" required></div>
          <div class="form-group"><label>Location *</label><input type="text" name="location" required></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Listing Type</label><select name="listingType"><option>FOR SALE</option><option>FOR LEASE</option></select></div>
          <div class="form-group"><label>Property Type</label><select name="propertyType"><option>Condominium</option><option>House and Lot</option><option>Commercial Lot</option></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Price</label><input type="number" name="price" value="0"></div>
          <div class="form-group"><label>Monthly Rental</label><input type="number" name="monthlyRental" value="0"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Bedrooms</label><input type="number" name="bedrooms" value="0"></div>
          <div class="form-group"><label>Bathrooms</label><input type="number" name="bathrooms" value="0"></div>
          <div class="form-group"><label>Floor Area (SQM)</label><input type="number" name="sqm" value="0"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Parking</label><input type="number" name="parking" value="0"></div>
          <div class="form-group"><label>Featured</label><select name="featured"><option value="false">No</option><option value="true">Yes</option></select></div>
          <div class="form-group"><label>Status</label><select name="status"><option value="available">Available</option><option value="leased">Leased</option><option value="sold">Sold</option></select></div>
        </div>
        <div class="form-group"><label>Description</label><textarea name="description" rows="4"></textarea></div>
        
        <div class="form-group">
          <label>Main Image</label>
          <button type="button" class="image-upload-btn" id="uploadMainBtn">Upload Main Image</button>
          <input type="file" id="mainImageFile" accept="image/*" style="display:none">
          <div id="mainPreview"></div>
        </div>
        
        <div class="form-group">
          <label>Gallery Images</label>
          <button type="button" class="image-upload-btn" id="uploadGalleryBtn">Upload Gallery Images</button>
          <input type="file" id="galleryFiles" accept="image/*" multiple style="display:none">
          <div id="galleryPreview" class="gallery-preview"></div>
          <small id="galleryCount">0 images</small>
        </div>
        
        <div class="form-group"><label>Map Location</label><input type="text" name="mapLocation"></div>
        
        <button type="submit" id="submitBtn">Add Property</button>
      </form>
    </div>
    
    <div id="inquiriesTab" class="tab-content"><div id="inquiryList"></div></div>
    <div id="subscribersTab" class="tab-content"><div id="subscribersList"></div></div>
    <div id="alertsTab" class="tab-content"><div id="alertsList"></div></div>
    <div id="imagesTab" class="tab-content"><div id="heroImagesGrid"></div></div>
  </div>
</div>

<div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; overflow-y:auto;">
  <div style="background:var(--white); max-width:800px; margin:50px auto; padding:32px; border-radius:24px;">
    <span onclick="closeEditModal()" style="float:right; font-size:28px; cursor:pointer;">&times;</span>
    <h2>Edit Property</h2>
    <form id="editForm">
      <input type="hidden" id="editId">
      <div class="form-row"><div class="form-group"><label>Title</label><input type="text" id="editTitle"></div><div class="form-group"><label>Location</label><input type="text" id="editLocation"></div></div>
      <div class="form-row"><div class="form-group"><label>Price</label><input type="number" id="editPrice"></div><div class="form-group"><label>Monthly Rental</label><input type="number" id="editMonthlyRental"></div></div>
      <div class="form-row"><div class="form-group"><label>Bedrooms</label><input type="number" id="editBedrooms"></div><div class="form-group"><label>Bathrooms</label><input type="number" id="editBathrooms"></div><div class="form-group"><label>SQM</label><input type="number" id="editSqm"></div></div>
      <div class="form-row"><div class="form-group"><label>Status</label><select id="editStatus"><option>available</option><option>leased</option><option>sold</option></select></div><div class="form-group"><label>Featured</label><select id="editFeatured"><option value="false">No</option><option value="true">Yes</option></select></div></div>
      <div class="form-group"><label>Description</label><textarea id="editDescription" rows="4"></textarea></div>
      <button type="submit">Save Changes</button>
      <button type="button" onclick="closeEditModal()">Cancel</button>
    </form>
  </div>
</div>

<script>
// Dark Mode
function toggleDarkMode() {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('darkMode', isDark);
  const btn = document.getElementById('headerDarkModeToggle');
  if (btn) btn.innerHTML = isDark ? '<i class="fas fa-sun"></i> Light Mode' : '<i class="fas fa-moon"></i> Dark Mode';
}
if (localStorage.getItem('darkMode') === 'true') toggleDarkMode();

function showToast(msg, isError = false) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.style.background = isError ? '#dc3545' : '#28a745';
  toast.innerHTML = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// Image Compression
async function compressImage(file, maxWidth = 800, quality = 0.6) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (e) => {
      const img = new Image();
      img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob((blob) => {
          resolve(new File([blob], file.name, { type: 'image/jpeg' }));
        }, 'image/jpeg', quality);
      };
    };
  });
}

// Upload Image
async function uploadImage(file) {
  const compressed = await compressImage(file);
  const formData = new FormData();
  formData.append('image', compressed);
  const res = await fetch('/api/admin/upload-property-image', { method: 'POST', body: formData });
  return await res.json();
}

// Variables
let currentMainImage = '';
let currentGallery = [];
let allProperties = [];

// Main Image Upload
document.getElementById('uploadMainBtn')?.addEventListener('click', () => document.getElementById('mainImageFile').click());
document.getElementById('mainImageFile')?.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  showToast('Uploading main image...');
  try {
    const result = await uploadImage(file);
    currentMainImage = result.url;
    document.getElementById('mainPreview').innerHTML = `<img src="${result.url}" style="width:100px; height:100px; object-fit:cover; border-radius:8px;"><br><small>Uploaded</small>`;
    showToast('Main image uploaded!');
  } catch(err) { showToast('Upload failed', true); }
});

// Gallery Upload
document.getElementById('uploadGalleryBtn')?.addEventListener('click', () => document.getElementById('galleryFiles').click());
document.getElementById('galleryFiles')?.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  for (const file of files) {
    try {
      const result = await uploadImage(file);
      currentGallery.push(result.url);
    } catch(err) { showToast('Failed to upload ' + file.name, true); }
  }
  const previewDiv = document.getElementById('galleryPreview');
  previewDiv.innerHTML = currentGallery.map((url, i) => `
    <div class="gallery-preview-item">
      <img src="${url}">
      <div class="remove-img" onclick="removeGalleryImage(${i})"><i class="fas fa-times"></i></div>
    </div>
  `).join('');
  document.getElementById('galleryCount').innerHTML = currentGallery.length + ' images';
  showToast(currentGallery.length + ' images uploaded');
});

function removeGalleryImage(index) {
  currentGallery.splice(index, 1);
  document.getElementById('galleryPreview').innerHTML = currentGallery.map((url, i) => `
    <div class="gallery-preview-item"><img src="${url}"><div class="remove-img" onclick="removeGalleryImage(${i})"><i class="fas fa-times"></i></div></div>
  `).join('');
  document.getElementById('galleryCount').innerHTML = currentGallery.length + ' images';
}

// Login
async function login() {
  const email = document.getElementById('adminEmail').value;
  const password = document.getElementById('adminPassword').value;
  try {
    const res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    if (res.ok) {
      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadStats();
      loadProperties();
      loadInquiries();
      loadSubscribers();
      loadAlerts();
      loadHeroImages();
    } else showToast('Wrong credentials', true);
  } catch(e) { showToast('Login failed', true); }
}

function logout() {
  document.getElementById('loginContainer').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}

async function loadStats() {
  const res = await fetch('/api/admin/stats');
  const stats = await res.json();
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><h3>Total Properties</h3><div class="number">${stats.totalProperties || 0}</div></div>
    <div class="stat-card"><h3>Available</h3><div class="number">${stats.availableProperties || 0}</div></div>
    <div class="stat-card"><h3>Inquiries</h3><div class="number">${stats.totalInquiries || 0}</div></div>
    <div class="stat-card"><h3>Subscribers</h3><div class="number">${stats.subscribers || 0}</div></div>
  `;
}

async function loadProperties() {
  const res = await fetch('/api/admin/all-properties');
  allProperties = await res.json();
  displayProperties(allProperties);
  const available = allProperties.filter(p => p.status === 'available').length;
  document.getElementById('statusSummary').innerHTML = `<span class="status-badge status-available">✅ Visible: ${available}</span>`;
}

function displayProperties(properties) {
  const container = document.getElementById('propertyList');
  if (!properties.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-home"></i><p>No properties</p></div>'; return; }
  container.innerHTML = properties.map(p => `
    <div class="property-item">
      <div class="property-info">
        <div class="property-title">${escapeHtml(p.title)} <span class="status-badge status-${p.status}">${p.status}</span></div>
        <div class="property-details">
          <span>📍 ${escapeHtml(p.location)}</span>
          <span>💰 ${p.listingType === 'FOR LEASE' ? '₱' + (p.monthlyRental || 0).toLocaleString() + '/mo' : '₱' + (p.price || 0).toLocaleString()}</span>
          <span>🛏️ ${p.bedrooms} BR</span>
          <span>🚽 ${p.bathrooms} TB</span>
        </div>
      </div>
      <div class="property-actions">
        <button onclick="editProperty('${p._id}')">Edit</button>
        <button class="danger" onclick="deleteProperty('${p._id}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function searchProperties() {
  const term = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('searchStatus').value;
  let filtered = allProperties;
  if (term) filtered = filtered.filter(p => p.title.toLowerCase().includes(term) || p.location.toLowerCase().includes(term));
  if (status) filtered = filtered.filter(p => p.status === status);
  displayProperties(filtered);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchStatus').value = '';
  displayProperties(allProperties);
}

function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(tabName + 'Tab').classList.add('active');
}

// Add Property
document.getElementById('propertyForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const property = {
    title: fd.get('title'), location: fd.get('location'),
    price: parseFloat(fd.get('price')) || 0, monthlyRental: parseFloat(fd.get('monthlyRental')) || 0,
    bedrooms: parseInt(fd.get('bedrooms')) || 0, bathrooms: parseInt(fd.get('bathrooms')) || 0,
    sqm: parseFloat(fd.get('sqm')) || 0, parking: parseInt(fd.get('parking')) || 0,
    description: fd.get('description'), featured: fd.get('featured') === 'true',
    status: fd.get('status'), listingType: fd.get('listingType'),
    propertyType: fd.get('propertyType'), mapLocation: fd.get('mapLocation') || '',
    mainImage: currentMainImage, gallery: currentGallery
  };
  const btn = document.getElementById('submitBtn');
  btn.innerHTML = 'Saving...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/admin/properties', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(property) });
    if (res.ok) {
      showToast('Property added!');
      e.target.reset();
      currentMainImage = '';
      currentGallery = [];
      document.getElementById('mainPreview').innerHTML = '';
      document.getElementById('galleryPreview').innerHTML = '';
      document.getElementById('galleryCount').innerHTML = '0 images';
      loadProperties();
      loadStats();
      switchTab('properties');
    } else showToast('Error saving', true);
  } catch(err) { showToast('Network error', true); }
  finally { btn.innerHTML = 'Add Property'; btn.disabled = false; }
});

async function deleteProperty(id) {
  if (!confirm('Delete this property?')) return;
  await fetch(`/api/admin/properties/${id}`, { method: 'DELETE' });
  loadProperties();
  loadStats();
}

async function editProperty(id) {
  const prop = allProperties.find(p => p._id === id);
  if (!prop) return;
  document.getElementById('editId').value = prop._id;
  document.getElementById('editTitle').value = prop.title || '';
  document.getElementById('editLocation').value = prop.location || '';
  document.getElementById('editPrice').value = prop.price || 0;
  document.getElementById('editMonthlyRental').value = prop.monthlyRental || 0;
  document.getElementById('editBedrooms').value = prop.bedrooms || 0;
  document.getElementById('editBathrooms').value = prop.bathrooms || 0;
  document.getElementById('editSqm').value = prop.sqm || 0;
  document.getElementById('editDescription').value = prop.description || '';
  document.getElementById('editStatus').value = prop.status || 'available';
  document.getElementById('editFeatured').value = prop.featured ? 'true' : 'false';
  document.getElementById('editModal').style.display = 'block';
}

function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

document.getElementById('editForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('editId').value;
  const property = {
    title: document.getElementById('editTitle').value,
    location: document.getElementById('editLocation').value,
    price: parseFloat(document.getElementById('editPrice').value) || 0,
    monthlyRental: parseFloat(document.getElementById('editMonthlyRental').value) || 0,
    bedrooms: parseInt(document.getElementById('editBedrooms').value) || 0,
    bathrooms: parseInt(document.getElementById('editBathrooms').value) || 0,
    sqm: parseFloat(document.getElementById('editSqm').value) || 0,
    description: document.getElementById('editDescription').value,
    status: document.getElementById('editStatus').value,
    featured: document.getElementById('editFeatured').value === 'true'
  };
  const res = await fetch(`/api/admin/properties/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(property) });
  if (res.ok) {
    showToast('Property updated');
    closeEditModal();
    loadProperties();
  } else showToast('Error updating', true);
});

async function loadInquiries() {
  const res = await fetch('/api/admin/inquiries');
  const inquiries = await res.json();
  const container = document.getElementById('inquiryList');
  if (!inquiries.length) { container.innerHTML = '<div class="empty-state">No inquiries</div>'; return; }
  container.innerHTML = inquiries.map(i => `<div class="property-item"><div><strong>${escapeHtml(i.name)}</strong> (${escapeHtml(i.email)})<br>${escapeHtml(i.message)}<br><small>${new Date(i.createdAt).toLocaleString()}</small></div><button onclick="deleteInquiry('${i._id}')">Delete</button></div>`).join('');
}

async function deleteInquiry(id) {
  await fetch(`/api/admin/inquiries/${id}`, { method: 'DELETE' });
  loadInquiries();
}

async function loadSubscribers() {
  const res = await fetch('/api/admin/subscribers');
  const subs = await res.json();
  const container = document.getElementById('subscribersList');
  if (!subs.length) { container.innerHTML = '<div class="empty-state">No subscribers</div>'; return; }
  container.innerHTML = subs.map(s => `<div class="property-item"><div>${escapeHtml(s.email)}<br><small>${new Date(s.subscribedAt).toLocaleDateString()}</small></div><button onclick="deleteSubscriber('${s._id}')">Delete</button></div>`).join('');
}

async function deleteSubscriber(id) {
  await fetch(`/api/admin/subscribers/${id}`, { method: 'DELETE' });
  loadSubscribers();
}

async function loadAlerts() {
  const res = await fetch('/api/admin/price-alerts');
  const alerts = await res.json();
  const container = document.getElementById('alertsList');
  if (!alerts.length) { container.innerHTML = '<div class="empty-state">No alerts</div>'; return; }
  container.innerHTML = alerts.map(a => `<div class="property-item"><div><strong>${escapeHtml(a.propertyTitle)}</strong><br>${escapeHtml(a.email)}<br>₱${(a.propertyPrice || 0).toLocaleString()}</div></div>`).join('');
}

async function loadHeroImages() {
  const res = await fetch('/api/admin/hero-images');
  const images = await res.json();
  const container = document.getElementById('heroImagesGrid');
  if (!images.length) { container.innerHTML = '<div class="empty-state">No hero images</div>'; return; }
  container.innerHTML = images.map(img => `<div style="margin:10px; display:inline-block;"><img src="${img.url}" style="width:200px; height:150px; object-fit:cover; border-radius:12px;"><br><button onclick="deleteHeroImage('${img._id}')">Delete</button></div>`).join('');
}

async function deleteHeroImage(id) {
  await fetch(`/api/admin/hero-images/${id}`, { method: 'DELETE' });
  loadHeroImages();
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}
